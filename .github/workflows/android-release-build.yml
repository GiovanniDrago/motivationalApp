name: Android Publish Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_PASSWORD != '' && secrets.KEY_PASSWORD != '' && secrets.KEY_ALIAS != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Set release metadata
        run: |
          echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Decode keystore
        if: env.HAS_RELEASE_SIGNING == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/motivational_app.keystore

      - name: Create key.properties
        if: env.HAS_RELEASE_SIGNING == 'true'
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=motivational_app.keystore" >> android/key.properties

      - name: Build direct release APK
        run: |
          flutter build apk --release --flavor direct --build-name "$APP_VERSION" --build-number "$BUILD_NUMBER" --dart-define=DISTRIBUTION_CHANNEL=direct --dart-define=ABOUT_URL=https://github.com/GiovanniDrago/motivationalApp --dart-define=DONATION_URL=https://buymeacoffee.com/_takasu_
          mv build/app/outputs/flutter-apk/app-direct-release.apk build/app/outputs/flutter-apk/motivational-app-direct-v${APP_VERSION}+${BUILD_NUMBER}.apk

      - name: Build play release App Bundle
        run: |
          flutter build appbundle --release --flavor play --build-name "$APP_VERSION" --build-number "$BUILD_NUMBER" --dart-define=DISTRIBUTION_CHANNEL=play --dart-define=ABOUT_URL=https://github.com/GiovanniDrago/motivationalApp --dart-define=DONATION_URL=
          mv build/app/outputs/bundle/playRelease/app-play-release.aab build/app/outputs/bundle/playRelease/motivational-app-play-v${APP_VERSION}+${BUILD_NUMBER}.aab

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/motivational-app-direct-v${{ env.APP_VERSION }}+${{ env.BUILD_NUMBER }}.apk
            build/app/outputs/bundle/playRelease/motivational-app-play-v${{ env.APP_VERSION }}+${{ env.BUILD_NUMBER }}.aab
